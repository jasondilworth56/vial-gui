name: CI

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./util/linux-builder/build-in-docker.sh

      - uses: actions/upload-artifact@v4
        with:
          name: vial-linux
          path: util/linux-builder/output/Vial-x86_64.AppImage

  build-mac:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Build
        run: |
          source venv/bin/activate
          pyinstaller misc/Vial.spec
          hdiutil create -volname Vial -srcfolder "dist/Vial.app" -ov -format UDZO vial-mac.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: vial-mac
          path: vial-mac.dmg

  build-win:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup venv
        run: |
          python -m venv venv
          . .\venv\Scripts\activate.ps1
          pip install -r requirements.txt

      - name: Install NSIS
        run: |
          Invoke-WebRequest "https://github.com/vial-kb/vial-deps/releases/download/v1/nsis-3.06.1-setup.exe" -UserAgent "wget" -OutFile nsis-3.06.1-setup.exe
          if ((Get-FileHash nsis-3.06.1-setup.exe -Algorithm sha256).Hash -ne "f60488a676308079bfdf6845dc7114cfd4bbff47b66be4db827b89bb8d7fdc52") { Write-Error 'SHA256 mismatch' }
          Start-Process -FilePath "nsis-3.06.1-setup.exe" -ArgumentList "/S", "/D=C:\Program Files (x86)\NSIS" -NoNewWindow -Wait

      - name: Build
        run: |
          . .\venv\Scripts\activate.ps1
          pyinstaller misc/Vial.spec
          Compress-Archive -Path "dist\Vial" -DestinationPath vial-win.zip

      - uses: actions/upload-artifact@v4
        with:
          name: vial-win
          path: vial-win.zip

      - name: Create installer
        run: |
          $env:Path += ";C:\Program Files (x86)\NSIS"
          $repo = (Get-Location).Path
          $appDir = Join-Path $repo "dist\Vial"
          $installerPath = Join-Path $repo "dist\VialSetup.exe"
          if (!(Test-Path $appDir)) { throw "Missing app directory: $appDir" }
          makensis /Dapp_name=Vial /Dauthor=xyz /Dapp_dir="$appDir" /Dinstaller="$installerPath" src/installer/windows/Installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: vial-win-installer
          path: dist\VialSetup.exe
